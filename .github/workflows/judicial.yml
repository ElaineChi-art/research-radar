name: Judicial judgments (TW)

on:
  schedule:
    # 司法院 API 僅台灣 00:00–06:00 開放 = UTC 16:00–22:00。
    # 排 UTC 17:00（台灣 01:00）執行，留足緩衝。
    - cron: "0 17 * * *"
  workflow_dispatch:        # 手動執行請注意：非服務時段(台灣00-06時外)API會關閉

permissions:
  contents: write

concurrency:
  group: judicial
  cancel-in-progress: false

jobs:
  judgments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch judgments (full text, keyword-filtered)
        env:
          JUDICIAL_USER: ${{ secrets.JUDICIAL_USER }}
          JUDICIAL_PASS: ${{ secrets.JUDICIAL_PASS }}
        run: python judicial.py

      - name: Commit judgments data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/judgments.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: 司法院判決全文更新 $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main || true
            git push
          fi
